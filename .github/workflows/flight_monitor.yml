name: Weekly Flight Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 5'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py
